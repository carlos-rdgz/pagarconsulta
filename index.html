<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Pago Consulta - $100 USD</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://www.paypal.com/sdk/js?client-id=AZyElkuGTtZOQKbi8ZFTWu7Zl4gbfaWGvBYqPaH4aDX32QFJtlxhc4dfMvle4CSy0zTYH3lsSq2UxtEI&components=card-fields&currency=USD&intent=capture"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #f4f6fa; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .container { max-width: 500px; width: 100%; background: white; border-radius: 18px; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #223366; margin-bottom: 30px; font-size: 24px; font-weight: 600; }
        .form-group { margin-bottom: 20px; position: relative; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; color: #374151; }
        .form-group input { width: 100%; height: 48px; padding: 0 16px 0 48px; border: 2px solid #e5e7eb; border-radius: 12px; background: #fafbfc; font-size: 16px; transition: border-color 0.3s; }
        .form-group input:focus { outline: none; border-color: #223366; }
        .input-icon { position: absolute; left: 16px; top: 44px; transform: translateY(-50%); color: #9ca3af; z-index: 1; }
        #card-number, #card-expiry, #card-cvv { height: 48px; border: 2px solid #e5e7eb; border-radius: 12px; background: #fafbfc; margin-bottom: 8px; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        .card-row { display: flex; gap: 12px; }
        .card-row > div { flex: 1; }
        .submit-btn { width: 100%; height: 50px; background: #223366; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.3s; font-family: 'Poppins', sans-serif; margin-top: 10px; }
        .submit-btn:hover { background: #1e2d50; }
        .submit-btn:disabled { background: #9ca3af; cursor: not-allowed; }
        .success-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .success-content { background: white; padding: 40px; border-radius: 18px; text-align: center; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .success-icon { font-size: 60px; color: #10b981; margin-bottom: 20px; }
        .success-title { font-size: 24px; color: #111827; margin-bottom: 10px; font-weight: 600; }
        .close-btn { background: #10b981; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 20px; font-family: 'Poppins', sans-serif; }
        .close-btn:hover { background: #059669; }
    </style>
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-credit-card"></i> Pagar $100 USD</h1>
        <form id="paymentForm">
            <div class="form-group">
                <label>Nombre Completo</label>
                <i class="fas fa-user input-icon"></i>
                <input type="text" id="nombre" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <i class="fas fa-envelope input-icon"></i>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label>Teléfono</label>
                <i class="fas fa-phone input-icon"></i>
                <input type="tel" id="telefono" required>
            </div>
            <div class="form-group">
                <label>Dirección Completa</label>
                <i class="fas fa-map-marker-alt input-icon"></i>
                <input type="text" id="direccion" required>
            </div>
            <div class="form-group">
                <label>Tarjeta de Crédito</label>
                <div id="card-number"></div>
            </div>
            <div class="form-group">
                <label>Vencimiento / CVV</label>
                <div class="card-row">
                    <div id="card-expiry"></div>
                    <div id="card-cvv"></div>
                </div>
            </div>
            <button type="submit" class="submit-btn" id="submitBtn">
                Pagar $100.00 USD
            </button>
        </form>
    </div>
    <div id="successModal" class="success-modal">
        <div class="success-content">
            <div class="success-icon"><i class="fas fa-check-circle"></i></div>
            <h2>¡Pago Exitoso!</h2>
            <p>Tu consulta ha sido confirmada. Recibirás email pronto.</p>
            <button class="close-btn" onclick="closeModal()">Listo</button>
        </div>
    </div>
    <script>
        let cardFields = null;
        const submitBtn = document.getElementById('submitBtn');
        const form = document.getElementById('paymentForm');
        const modal = document.getElementById('successModal');
        
        // Poll for PayPal SDK
        function initCardFields() {
            if (typeof paypal !== 'undefined' && paypal.CardFields) {
                const eligible = paypal.CardFields().isEligible();
                if (eligible) {
                    cardFields = paypal.CardFields({
                        createOrder: function(data, actions) {
                            return fetch('/create-order', { method: 'POST' })
                                .then(res => res.json())
                                .then(data => data.id)
                                .catch(err => {
                                    console.error('Create order error:', err);
                                    throw err;
                                });
                        },
                        onApprove: function(data, actions) {
                            return fetch('/capture-order', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ orderID: data.orderID })
                            }).then(res => res.json()).then(captureData => {
                                modal.style.display = 'flex';
                                form.reset();
                                submitBtn.disabled = false;
                            }).catch(err => {
                                console.error('Capture error:', err);
                                submitBtn.disabled = false;
                            });
                        },
                        onError: function(err) {
                            console.error('PayPal error:', err);
                            submitBtn.disabled = false;
                        }
                    });
                    cardFields.render('#card-number', 'number');
                    cardFields.render('#card-expiry', 'expiry');
                    cardFields.render('#card-cvv', 'cvv');
                    console.log('CardFields rendered');
                } else {
                    console.error('PayPal Card Fields not eligible in this browser');
                }
            } else {
                setTimeout(initCardFields, 250);
            }
        }
        
        form.addEventListener('submit', e => {
            e.preventDefault();
            if (cardFields) {
                submitBtn.disabled = true;
                cardFields.submit();
            }
        });
        
        function closeModal() {
            modal.style.display = 'none';
        }
        
        window.addEventListener('load', initCardFields);
    </script>
</body>
</html>
