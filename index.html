<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    
script-src 'self' 'unsafe-inline' https://www.paypal.com https://*.paypal.com https://cdnjs.cloudflare.com https://fonts.googleapis.com https://fonts.gstatic.com https://www.paypalobjects.com
    
    <title>Consulta de Abogado - Realiza tu Pago</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <script src="https://www.paypal.com/sdk/js?client-id=AZyElkuGTtZOQKbi8ZFTWu7Zl4gbfaWGvBYqPaH4aDX32QFJtlxhc4dfMvle4CSy0zTYH3lsSq2UxtEI&components=card-fields&currency=USD&intent=capture"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: #f4f6fa;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            max-width: 500px;
            width: 100%;
            background: #fff;
            border-radius: 18px;
            padding: 40px 32px;
            box-shadow: 0 8px 32px rgba(44,62,80,0.10);
            border: 1px solid #e3e8ee;
        }
        
        h1 {
            text-align: center;
            color: #223366;
            margin-bottom: 30px;
            font-size: 28px;
            font-weight: 700;
        }
        
        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #223366;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            height: 48px;
            padding-left: 40px;
            border: 1.5px solid #d1d9e6;
            border-radius: 10px;
            background: #f9fafb;
            font-size: 15px;
            outline: none;
        }

        .input-icon {
            position: absolute;
            bottom: 16px;
            left: 15px;
            color: #8c98a4;
        }
        
        /* ESTILOS CORREGIDOS DE PAYPAL */
        .card-field-container {
            position: relative;
            margin-bottom: 20px;
        }
        #card-number, #card-cvv, #card-expiry {
            height: 48px;
            border: 1.5px solid #d1d9e6;
            border-radius: 10px;
            background: #f9fafb;
            padding: 0 15px;
        }
        .card-row {
            display: flex;
            gap: 15px;
            margin-top: 15px;
        }
        .card-row > div {
            flex: 1;
        }

        /* ESTILO DEL BOTÓN */
        .submit-btn {
            width: 100%;
            height: 50px;
            background: #223366;
            color: white;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s;
        }
        .submit-btn:hover {
            background: #152244;
        }

        /* ESTILO DEL MODAL */
        .success-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }
        .success-content {
            background: white;
            padding: 40px;
            border-radius: 18px;
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        .success-icon {
            font-size: 50px;
            color: #28a745;
            margin-bottom: 15px;
        }
        .close-btn {
            margin-top: 20px;
            padding: 10px 25px;
            background: #223366;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-credit-card"></i> Realiza tu Pago</h1>
        <form id="paymentForm" name="payment" data-netlify="true">
            <input type="hidden" name="form-name" value="payment">
            
            <div class="form-group">
                <label for="nombre">Nombre</label>
                <i class="fas fa-user input-icon"></i>
                <input type="text" id="nombre" name="nombre" placeholder="Ingresa tu nombre" required>
            </div>
            <div class="form-group">
                <label for="apellido">Apellido</label>
                <i class="fas fa-user-tag input-icon"></i>
                <input type="text" id="apellido" name="apellido" placeholder="Ingresa tu apellido" required>
            </div>
            <div class="form-group">
                <label for="correo">Correo Electrónico</label>
                <i class="fas fa-envelope input-icon"></i>
                <input type="email" id="correo" name="correo" placeholder="tu@email.com" required>
            </div>
            <div class="form-group">
                <label for="telefono">Teléfono</label>
                <i class="fas fa-phone input-icon"></i>
                <input type="tel" id="telefono" name="telefono" placeholder="XXX-XXX-XXXX" required>
            </div>
            <div class="form-group">
                <label for="seguro_social">Seguro Social</label>
                <i class="fas fa-id-card input-icon"></i>
                <input type="text" id="seguro_social" name="seguro_social" placeholder="XXX-XX-XXXX" required>
            </div>
            <div class="form-group">
                <label for="direccion">Dirección</label>
                <i class="fas fa-map-marker-alt input-icon"></i>
                <input type="text" id="direccion" name="direccion" placeholder="Tu dirección completa" required>
            </div>
            
            <div class="card-field-container">
                <label><i class="fas fa-credit-card"></i> Número de Tarjeta</label>
                <div id="card-number"></div>
                
                <div class="card-row">
                    <div>
                        <label>Vencimiento</label>
                        <div id="card-expiry"></div>
                    </div>
                    <div>
                        <label>CVV</label>
                        <div id="card-cvv"></div>
                    </div>
                </div>
            </div>
            
            <button type="submit" class="submit-btn" id="submit-btn">
                <i class="fas fa-shield-alt"></i> Pagar $100.00 USD
            </button>
        </form>
    </div>

    <div id="successModal" class="success-modal">
        <div class="success-content">
            <div class="success-icon"><i class="fas fa-check-circle"></i></div>
            <h2>¡Pago Exitoso!</h2>
            <p>Tu consulta ha sido programada.</p>
            <button class="close-btn" onclick="closeModal()">Cerrar</button>
        </div>
    </div>

    <script>
        // Verificamos que PayPal haya cargado correctamente
        if (typeof paypal !== 'undefined' && paypal.CardFields().isEligible()) {
            
            const cardField = paypal.CardFields({
                createOrder: function () {
                    // Llama a tu servidor Ruby Sinatra
                    return fetch('http://localhost:4567/create-order', {
                        method: 'post'
                    }).then(res => res.json()).then(data => data.id);
                },
                onApprove: function (data) {
                    // Captura el pago en tu servidor Ruby
                    return fetch('http://localhost:4567/capture-order', {
                        method: 'post',
                        headers: {'content-type': 'application/json'},
                        body: JSON.stringify({orderID: data.orderID})
                    }).then(res => res.json()).then(details => {
                        
                        // Si el pago es exitoso, enviamos los datos a Netlify
                        const form = document.getElementById('paymentForm');
                        const formData = new FormData(form);
                        
                        fetch('/', {
                            method: 'POST',
                            headers: { "Content-Type": "application/x-www-form-urlencoded" },
                            body: new URLSearchParams(formData).toString()
                        }).then(() => {
                            // Mostrar el Modal de éxito
                            document.getElementById('successModal').style.display = 'flex';
                        }).catch(error => alert("Pago exitoso, pero hubo un error enviando los datos a la oficina."));
                        
                    });
                },
                onError: function (err) {
                    alert("Hubo un problema procesando tu tarjeta. Verifica los datos.");
                    console.error(err);
                }
            });

            // Dibujar los campos en el HTML
            cardField.NumberField().render('#card-number');
            cardField.CVVField().render('#card-cvv');
            cardField.ExpiryField().render('#card-expiry');

            // Conectar el botón de enviar con PayPal
            document.getElementById('paymentForm').addEventListener('submit', function(event) {
                event.preventDefault(); // Evita que la página se recargue
                cardField.submit(); // Lanza el proceso de cobro de PayPal
            });

        } else {
            console.error("Los campos de tarjeta de PayPal no son elegibles en este entorno.");
        }

        function closeModal() {
            document.getElementById('successModal').style.display = 'none';
            window.location.reload(); // Recarga la página para el próximo cliente
        }
    </script>
</body>
</html>
