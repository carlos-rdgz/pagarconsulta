    <style>
        /* Existing styles + PayPal field styles */
        .paypal-field {
            min-height: 44px;
            border: 1.5px solid #d1d9e6;
            border-radius: 10px;
            background: #f9fafb;
            margin-bottom: 10px;
            transition: all 0.3s ease;
        }
        .paypal-field.focused {
            border-color: #223366;
            box-shadow: 0 0 0 2px #b3c6f7;
        }
        .paypal-field.invalid {
            border-color: #ef4444;
        }
        /* Rest of existing styles... */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        /* ... paste all original styles from previous read_file ... */
    </style>
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-credit-card"></i> Realiza tu Pago</h1>
        <form id="paymentForm">
            <!-- All existing fields except card row and nombre_tarjeta -->
            <div class="form-group">
                <label for="nombre"><i class="fas fa-user"></i> Nombre</label>
                <i class="fas fa-user input-icon"></i>
                <input type="text" id="nombre" name="nombre" placeholder="Ingresa tu nombre" required>
            </div>
            <!-- ... apellido, correo, telefono, seguro_social, fecha_cumpleanos, direccion, ciudad, cp ... -->
            <div class="form-group">
                <label><i class="fas fa-credit-card"></i> Tarjeta de Crédito (PayPal Secure Fields)</label>
                <div id="card-number-field" class="paypal-field"></div>
                <div class="card-row">
                    <div id="cvv-field" class="paypal-field"></div>
                    <div id="expiration-field" class="paypal-field"></div>
                </div>
            </div>
            <button type="submit" class="submit-btn" id="payButton">
Pagar $100.00 USD
            </button>
        </form>
    </div>
    <!-- successModal same -->
    <script>
        let hostedFields;
        
        paypal.HostedFields({
            fields: {
                number: {
                    selector: '#card-number-field',
                    placeholder: '0000 0000 0000 0000'
                },
                cvv: {
                    selector: '#cvv-field',
                    placeholder: '123'
                },
                expiry: {
                    selector: '#expiration-field',
                    placeholder: 'MM/YY'
                }
            }
        }).then((hf) => {
            hostedFields = hf;
            // State changes
            hostedFields.on('validityChange', (event) => {
                const field = event.fields[event.field];
                const statusClass = field.isValid || field.isEmpty ? 'focused' : 'invalid';
                document.getElementById(event.field + '-field').className = 'paypal-field ' + statusClass;
            });
        }).catch((err) => console.error('Error loading hosted fields:', err));

        document.getElementById('paymentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Validate non-card fields (existing validation code)
            // ...
            
            const form = e.target;
            const formData = Object.fromEntries(new FormData(form));
            
            try {
                const tokenization = await hostedFields.tokenize();
                
                const response = await fetch('http://localhost:4567/process-payment', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        order_amount: 50.00,
                        card_data: tokenization,
                        form_data: formData
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    // Send to Netlify forms
                    const netlifyData = new FormData();
                    Object.keys(formData).forEach(key => netlifyData.append(key, formData[key]));
                    await fetch('/', {
                        method: 'POST',
                        body: netlifyData
                    });
                    
                    document.getElementById('successModal').style.display = 'flex';
                } else {
                    alert('Error en pago: ' + result.error);
                }
            } catch (err) {
                alert('Error: ' + err.message);
            }
        });
        
        // Existing format/validation + closeModal
    </script>
</body>
</html>
