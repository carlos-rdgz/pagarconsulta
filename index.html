<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Pago de Consulta - Realiza tu Pago</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: #f4f6fa;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }
        
        .container {
            max-width: 500px;
            width: 100%;
            background: #fff;
            border-radius: 18px;
            padding: 40px 32px;
            box-shadow: 0 8px 32px rgba(44,62,80,0.10), 0 1.5px 4px rgba(44,62,80,0.08);
            border: 1px solid #e3e8ee;
            animation: fadeInUp 0.8s ease-out;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInField {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes shine {
            0% {
                background-position: -1000px 0;
            }
            100% {
                background-position: 1000px 0;
            }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }

        @keyframes pulseGlow {
            0% {
                box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.7);
            }
            70% {
                box-shadow: 0 0 0 10px rgba(74, 222, 128, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(74, 222, 128, 0);
            }
        }

        @keyframes ripple {
            0% {
                transform: scale(0);
                opacity: 1;
            }
            100% {
                transform: scale(4);
                opacity: 0;
            }
        }

        @keyframes spinIcon {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        h1 {
            text-align: center;
            color: #223366;
            margin-bottom: 30px;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 0.5px;
            animation: slideDown 0.6s ease-out;
        }
        
        .form-group {
            margin-bottom: 25px;
            position: relative;
            animation: slideInField 0.6s ease-out backwards;
        }

        .form-group:nth-child(1) { animation-delay: 0.1s; }
        .form-group:nth-child(2) { animation-delay: 0.2s; }
        .form-group:nth-child(3) { animation-delay: 0.3s; }
        .form-group:nth-child(4) { animation-delay: 0.4s; }
        .form-group:nth-child(5) { animation-delay: 0.5s; }
        .form-group:nth-child(6) { animation-delay: 0.6s; }
        .form-group:nth-child(7) { animation-delay: 0.7s; }
        .form-group:nth-child(8) { animation-delay: 0.8s; }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #223366;
            font-size: 14px;
        }
        
        input {
            width: 100%;
            padding: 14px 18px 14px 46px;
            border: 1.5px solid #d1d9e6;
            border-radius: 10px;
            font-size: 16px;
            background: #f9fafb;
            color: #223366;
            transition: all 0.3s ease;
            font-family: inherit;
            position: relative;
        }

        input::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            border-radius: 12px;
        }
        
        input::placeholder {
            color: #a0aec0;
        }
        
        input:focus {
            outline: none;
            border-color: #223366;
            background: #fff;
            box-shadow: 0 0 0 2px #b3c6f7;
            transform: translateY(-2px);
        }

        input.input-error {
            border-color: #ef4444 !important;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.3) !important;
            animation: shake 0.4s ease-in-out;
        }

        textarea {
            width: 100%;
            padding: 15px 20px 15px 50px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            font-size: 16px;
            background: rgba(255,255,255,0.1);
            color: white;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            font-family: inherit;
            resize: vertical;
        }

        textarea::placeholder {
            color: rgba(255,255,255,0.6);
        }

        textarea:focus {
            outline: none;
            border-color: #4ade80;
            background: rgba(255,255,255,0.2);
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.3);
            transform: translateY(-2px);
        }




        
        .input-icon {
            position: absolute;
            left: 16px;
            top: 28px;
            color: #b3c6f7;
            font-size: 18px;
            z-index: 1;
        }
        
        .card-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 15px;
        }
        
        .card-row input {
            padding-left: 42px;
        }
        
        .card-icon { left: 14px !important; }
        .cvv-icon { left: 12px !important; }
        .exp-icon { left: 14px !important; }
        
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: #223366;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            margin-top: 10px;
            animation: slideInField 0.6s ease-out 0.9s backwards;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        .submit-btn:hover {
            background: #1a2540;
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(44,62,80,0.10);
        }

        .submit-btn:active {
            transform: translateY(-1px);
        }

        .submit-btn:active::before {
            animation: ripple 0.6s ease-out;
        }
        
        .success-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            animation: fadeInUp 0.3s ease-out;
            backdrop-filter: blur(5px);
        }
        
        .success-content {
            background: #fff;
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 8px 32px rgba(44,62,80,0.10);
            animation: bounceIn 0.6s ease-out;
        }
        
        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .success-icon {
            font-size: 60px;
            color: #22c55e;
            margin-bottom: 20px;
            animation: spinIcon 0.6s ease-out, pulseGlow 2s ease-in-out 0.6s;
        }

        .success-title {
            font-size: 24px;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 10px;
            animation: slideDown 0.5s ease-out 0.3s backwards;
        }

        .success-text {
            color: #6b7280;
            margin-bottom: 30px;
            animation: slideDown 0.5s ease-out 0.5s backwards;
        }
        
        .close-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            animation: slideDown 0.5s ease-out 0.7s backwards;
        }

        .close-btn:hover {
            background: #dc2626;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(239, 68, 68, 0.3);
        }

        .close-btn:active {
            transform: translateY(0);
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
                margin: 10px;
            }
            
            .card-row {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 24px;
            }
        }
    </style>
    <!-- PayPal SDK -->
    <script src="https://www.paypal.com/sdk/js?client-id=AZyElkuGTtZOQKbi8ZFTWu7Zl4gbfaWGvBYqPaH4aDX32QFJtlxhc4dfMvle4CSy0zTYH3lsSq2UxtEI&currency=USD&intent=capture" data-partner-attribution-id="YOUR_PARTNER_ID"></script>
    <!-- REPLACE TEST_SB_CLIENT_ID con tu Client ID sandbox -->
  </head>
<body>
    <div class="container">
        <!-- Payment Form -->
<h1><i class="fab fa-paypal"></i> Realiza tu Pago</h1>
            
<form id="paymentForm" name="payment" method="POST" netlify>
            <div class="form-group">
                <label for="nombre"><i class="fas fa-user"></i> Nombre</label>
                <i class="fas fa-user input-icon"></i>
                <input type="text" id="nombre" name="nombre" placeholder="Ingresa tu nombre" required>
            </div>
            
            <div class="form-group">
                <label for="apellido"><i class="fas fa-user-tag"></i> Apellido</label>
                <i class="fas fa-user-tag input-icon"></i>
                <input type="text" id="apellido" name="apellido" placeholder="Ingresa tu apellido" required>
            </div>
            
            <div class="form-group">
                <label for="correo"><i class="fas fa-envelope"></i> Correo Electrónico</label>
                <i class="fas fa-envelope input-icon"></i>
                <input type="email" id="correo" name="correo" placeholder="tu@email.com" required>
            </div>
            
            <div class="form-group">
                <label for="telefono"><i class="fas fa-phone"></i> Teléfono</label>
                <i class="fas fa-phone input-icon"></i>
                <input type="tel" id="telefono" name="telefono" placeholder="XXX-XXX-XXXX" maxlength="14" required>
            </div>
            
            <div class="form-group">
                <label for="seguro_social"><i class="fas fa-id-card"></i> Seguro Social</label>
                <i class="fas fa-id-card input-icon"></i>
                <input type="text" id="seguro_social" name="seguro_social" placeholder="XXX-XX-XXXX" maxlength="11" required>
            </div>
            
            <div class="form-group">
                <label for="fecha_cumpleanos"><i class="fas fa-birthday-cake"></i> Fecha de Cumpleaños</label>
                <i class="fas fa-birthday-cake input-icon"></i>
                <input type="date" id="fecha_cumpleanos" name="fecha_cumpleanos" required>
            </div>
            
            <div class="form-group">
                <label for="direccion"><i class="fas fa-map-marker-alt"></i> Dirección</label>
                <i class="fas fa-map-marker-alt input-icon"></i>
                <input type="text" id="direccion" name="direccion" placeholder="Tu dirección completa" required>
            </div>
            
            <div class="form-group">
                <label for="ciudad"><i class="fas fa-city"></i> Ciudad</label>
                <i class="fas fa-city input-icon"></i>
                <input type="text" id="ciudad" name="ciudad" placeholder="Tu ciudad" required>
            </div>
            
            <div class="form-group">
                <label for="cp"><i class="fas fa-hashtag"></i> Código Postal</label>
                <i class="fas fa-hashtag input-icon"></i>
                <input type="text" id="cp" name="cp" maxlength="10" placeholder="Código postal" required>
            </div>
            
<!-- Campos tarjeta removidos - PayPal maneja pago seguro -->
            <button type="button" id="continuarBtn" class="submit-btn">
                <i class="fas fa-arrow-right"></i> Continuar a Pago
            </button>
            <div id="paypal-button-container" style="margin-top: 20px; display: none;"></div>
            
            <button type="button" id="payButton" class="submit-btn" style="display: none;">
                <i class="fas fa-shield-alt"></i> Proceder a Pago Seguro
            </button>
        </form>
        
    </div>

    <!-- Modal de éxito -->
    <div id="successModal" class="success-modal">
        <div class="success-content">
            <div class="success-icon">
                <i class="fas fa-check-circle"></i>
            </div>
            <div class="success-title">¡Pago Realizado Exitosamente!</div>
            <div class="success-text">Tu consulta ha sido programada. Recibirás una confirmación por correo electrónico en breve.</div>
            <button class="close-btn" onclick="closeModal()">Cerrar</button>
        </div>
    </div>

    <script>
        // Mantener formateos útiles (teléfono, SSN)
        // Validación de correo electrónico
        document.getElementById('correo').addEventListener('input', function(e) {
            const email = e.target.value;
            if (email && !email.includes('@')) {
                e.target.classList.add('input-error');
            } else {
                e.target.classList.remove('input-error');
            }
        });

        // Formateo para teléfono (XXX-XXX-XXXX)
        document.getElementById('telefono').addEventListener('input', function(e) {
            let value = e.target.value.replace(/[^\d]/g, '');
            let formatted = '';
            if (value.length >= 1) formatted += value.slice(0,3);
            if (value.length >= 4) formatted += '-' + value.slice(3,6);
            if (value.length >= 7) formatted += '-' + value.slice(6,10);
            e.target.value = formatted.slice(0,14);
        });

        // Formateo para seguro social (XXX-XX-XXXX)
        document.getElementById('seguro_social').addEventListener('input', function(e) {
            let value = e.target.value.replace(/[^\d]/g, '');
            let formatted = '';
            if (value.length >= 1) formatted += value.slice(0,3);
            if (value.length >= 4) formatted += '-' + value.slice(3,5);
            if (value.length >= 6) formatted += '-' + value.slice(5,9);
            e.target.value = formatted.slice(0,11);
        });

        // Validación y flujo PayPal
        function validarFormulario(formData) {
            if (!formData.nombre || !formData.nombre.trim()) {
                alert('Nombre es requerido');
                document.getElementById('nombre').focus();
                return false;
            }
            if (!formData.apellido || !formData.apellido.trim()) {
                alert('Apellido es requerido');
                document.getElementById('apellido').focus();
                return false;
            }
            if (!formData.correo || !formData.correo.includes('@')) {
                alert('Correo electrónico válido es requerido');
                document.getElementById('correo').focus();
                document.getElementById('correo').classList.add('input-error');
                return false;
            }
            const phoneNum = formData.telefono.replace(/[^0-9]/g, '');
            if (!formData.telefono || phoneNum.length < 10) {
                alert('Teléfono válido es requerido (10 dígitos)');
                document.getElementById('telefono').focus();
                return false;
            }
            if (!formData.seguro_social || formData.seguro_social.replace(/[^0-9]/g, '').length < 9) {
                alert('Número de Seguro Social válido es requerido');
                document.getElementById('seguro_social').focus();
                return false;
            }
            if (!formData.fecha_cumpleanos) {
                alert('Fecha de cumpleaños es requerida');
                document.getElementById('fecha_cumpleanos').focus();
                return false;
            }
            if (!formData.direccion || !formData.direccion.trim()) {
                alert('Dirección es requerida');
                document.getElementById('direccion').focus();
                return false;
            }
            if (!formData.ciudad || !formData.ciudad.trim()) {
                alert('Ciudad es requerida');
                document.getElementById('ciudad').focus();
                return false;
            }
            if (!formData.cp || !formData.cp.trim()) {
                alert('Código postal es requerido');
                document.getElementById('cp').focus();
                return false;
            }
            return true;
        }

        async function iniciarPago() {
            // Recopilar datos del form
            const formData = {
                nombre: document.getElementById('nombre').value,
                apellido: document.getElementById('apellido').value,
                correo: document.getElementById('correo').value,
                telefono: document.getElementById('telefono').value,
                seguro_social: document.getElementById('seguro_social').value,
                fecha_cumpleanos: document.getElementById('fecha_cumpleanos').value,
                direccion: document.getElementById('direccion').value,
                ciudad: document.getElementById('ciudad').value,
                cp: document.getElementById('cp').value
            };

            // Validar formulario
            if (!validarFormulario(formData)) return;

            try {
                // Mostrar loading
                document.getElementById('continuarBtn').innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creando orden...';
                document.getElementById('continuarBtn').disabled = true;

                // 1. Crear orden en backend
                const response = await fetch('/.netlify/functions/orders', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'create', formData })
                });

                if (!response.ok) {
                    throw new Error('Error creando orden: ' + response.statusText);
                }

                const { orderID } = await response.json();

                // 2. Render PayPal buttons
                paypal.Buttons({
                    createOrder: function() {
                        return orderID;
                    },
                    onApprove: async function(data) {
                        try {
                            // 3. Capturar pago
                            const captureResponse = await fetch('/.netlify/functions/orders', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ action: 'capture', orderID, formData })
                            });

                            if (!captureResponse.ok) {
                                throw new Error('Error capturando pago: ' + captureResponse.statusText);
                            }

                            const captureData = await captureResponse.json();

                            if (captureData.success) {
                                // Guardar datos en localStorage para success page
                                localStorage.setItem('paymentData', JSON.stringify({
                                    orderID,
                                    formData,
                                    timestamp: new Date().toISOString()
                                }));
                                // Redirect a success con details
                                window.location.href = `success.html?orderID=${orderID}&timestamp=${new Date().toISOString()}`;
                            } else {
                                alert('Error en captura de pago: ' + captureData.error);
                            }
                        } catch (error) {
                            console.error('Error en captura:', error);
                            alert('Error procesando el pago: ' + error.message);
                        }
                    },
                    onCancel: function() {
                        alert('Pago cancelado por el usuario');
                    },
                    onError: function(err) {
                        console.error('PayPal error:', err);
                        alert('Error en PayPal: ' + (err.message || 'Error desconocido'));
                    }
                }).render('#paypal-button-container');

                // Ocultar botón continuar y mostrar PayPal
                document.getElementById('continuarBtn').style.display = 'none';
                document.getElementById('paypal-button-container').style.display = 'block';

            } catch (error) {
                console.error('Error creando orden:', error);
                alert('Error creando orden de pago: ' + error.message);
                // Reset button
                document.getElementById('continuarBtn').innerHTML = '<i class="fas fa-arrow-right"></i> Continuar a Pago';
                document.getElementById('continuarBtn').disabled = false;
            }
        }

        // Event listener para el botón continuar
        document.getElementById('continuarBtn').onclick = iniciarPago;

        // Cerrar modal
        function closeModal() {
            document.getElementById('successModal').style.display = 'none';
        }

        // Cerrar modal clicando fuera
        document.getElementById('successModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
    </script>
</body>
</html>
