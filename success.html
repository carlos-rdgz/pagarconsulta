<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Pago Exitoso! - Consulta Confirmada</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        /* Reutilizar estilos de index.html - glassmorphism, animaciones, etc. */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Poppins', sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            min-height: 100vh; 
            display: flex; align-items: center; justify-content: center; 
            padding: 20px; 
        }
        .container { 
            max-width: 500px; width: 100%; background: rgba(255,255,255,0.95); 
            backdrop-filter: blur(20px); border-radius: 20px; padding: 50px 40px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.1); text-align: center; 
            animation: fadeInUp 1s ease-out; 
        }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        .success-icon { font-size: 80px; color: #22c55e; margin-bottom: 20px; animation: bounce 1s; }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-10px); } 60% { transform: translateY(-5px); } }
        h1 { color: #1f2937; font-size: 28px; margin-bottom: 10px; }
        .details { background: rgba(74,222,128,0.1); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .detail-row { display: flex; justify-content: space-between; margin: 10px 0; font-size: 16px; }
        .btn-home { background: #223366; color: white; border: none; padding: 15px 30px; border-radius: 10px; font-size: 16px; cursor: pointer; text-decoration: none; display: inline-block; margin-top: 20px; transition: all 0.3s; }
        .btn-home:hover { background: #1a2540; transform: translateY(-2px); }
        @media (max-width: 600px) { .container { padding: 40px 20px; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-icon"><i class="fas fa-check-circle"></i></div>
        <h1>¡Pago Realizado!</h1>
        <p style="color: #6b7280; margin-bottom: 30px;">Tu pago de consulta ha sido procesado. Recibirás confirmación por email.</p>
        
        <div id="txDetails" class="details" style="display: none;">
            <div class="detail-row"><strong>ID Transacción:</strong> <span id="orderID"></span></div>
            <div class="detail-row"><strong>Monto:</strong> <span>$99.99 USD</span></div>
            <div class="detail-row"><strong>Fecha:</strong> <span id="timestamp"></span></div>
            <div class="detail-row"><strong>Cliente:</strong> <span id="cliente"></span></div>
            <div class="detail-row"><strong>Email:</strong> <span id="email"></span></div>
        </div>
        
        <a href="index.html" class="btn-home"><i class="fas fa-home"></i> Nueva Consulta</a>
    </div>

    <script>
        // Obtener detalles de URL query param (PayPal return)
        const urlParams = new URLSearchParams(window.location.search);
        const paymentStatus = urlParams.get('payment_status');
        const txnId = urlParams.get('txn_id');
        const customData = urlParams.get('custom');
        
        if (paymentStatus === 'Completed' && txnId) {
            // Parsear datos del formulario del campo custom
            let formData = {};
            if (customData) {
                try {
                    formData = JSON.parse(customData);
                } catch (e) {
                    console.error('Error parsing custom data:', e);
                }
            }
            
            document.getElementById('orderID').textContent = txnId;
            document.getElementById('timestamp').textContent = new Date().toLocaleString('es-ES');
            
            if (formData.nombre && formData.apellido) {
                document.getElementById('cliente').textContent = `${formData.nombre} ${formData.apellido}`;
            }
            if (formData.correo) {
                document.getElementById('email').textContent = formData.correo;
            }
            
            document.getElementById('txDetails').style.display = 'block';
        } else if (paymentStatus === 'Pending') {
            document.getElementById('orderID').textContent = txnId || 'Pendiente';
            document.getElementById('timestamp').textContent = new Date().toLocaleString('es-ES');
            document.getElementById('txDetails').style.display = 'block';
            alert('Tu pago está siendo procesado. Recibirás confirmación cuando se complete.');
        } else {
            // Si no hay parámetros de PayPal, mostrar mensaje genérico
            document.getElementById('orderID').textContent = 'Procesando...';
            document.getElementById('timestamp').textContent = new Date().toLocaleString('es-ES');
            document.getElementById('txDetails').style.display = 'block';
        }
    </script>
</body>
</html>
